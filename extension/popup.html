<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            padding: 14px;
            width: 260px;
            background: #f9fafb;
        }

        h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #status {
            margin-top: 10px;
            font-size: 13px;
        }

        .success { color: #16a34a; }
        .error { color: #dc2626; }
        .loading { color: #d97706; }

        .meta {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="card">

    <h3>Exam Helper</h3>

    <input id="apiKey" placeholder="API Key (only for peak mode)" />

    <button id="start">Start</button>

    <div id="status">Idle</div>
    <div id="meta" class="meta"></div>

</div>

<script src="popup.js"></script>

</body>
</html>
